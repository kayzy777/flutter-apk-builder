name: Build Flutter APK
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'

      - name: Extract ZIP project
        run: |
          set -e
          unzip -o project.zip -d extracted
          SUBFOLDER=$(ls extracted/ | head -1)
          if [ -f "extracted/$SUBFOLDER/pubspec.yaml" ]; then
            cp -r extracted/$SUBFOLDER/. ./
          elif [ -f "extracted/pubspec.yaml" ]; then
            cp -r extracted/. ./
          else
            echo "ERROR: pubspec.yaml tidak ditemukan"
            find extracted -name "pubspec.yaml"
            exit 1
          fi
          echo "=== pubspec.yaml ==="
          cat pubspec.yaml | head -8

      - name: Info build environment
        run: |
          echo "Gradle version:" && gradle --version || true
          echo "Flutter version:" && flutter --version

      - name: Setup Flutter 3.29.3
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.3'
          channel: stable
          cache: true

      - name: Accept Android licenses
        run: yes | flutter doctor --android-licenses || true

      - name: Flutter pub get
        run: flutter pub get

      - name: Build APK release
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7
          if-no-files-found: error
